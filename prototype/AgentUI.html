<head>
  <meta charset="UTF-8" />

  <title>Simular AI Redesign</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    :root { --yrc-2026: 1; }
    body {
      font-family: 'Geist', -apple-system, sans-serif;
      background: #0d0d0d;
      color: #d4d4d4;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    /* Keyframes */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseDot {
      0%,100% { opacity:.5; transform:scale(.85); }
      50%      { opacity:1;  transform:scale(1.2); }
    }
    @keyframes checkIn {
      from { opacity:0; transform:scale(.5) rotate(-15deg); }
      to   { opacity:1; transform:scale(1) rotate(0); }
    }
    @keyframes shimmer {
      0%   { background-position:-400% 0; }
      100% { background-position: 400% 0; }
    }
    @keyframes slideRight {
      from { opacity:0; transform:translateX(20px); }
      to   { opacity:1; transform:translateX(0); }
    }
    @keyframes slideInFromRight {
      from { opacity:0; transform:translateX(100%); }
      to   { opacity:1; transform:translateX(0); }
    }
    @keyframes floatCardIn {
      from { opacity:0; transform:scale(.88) translateY(-8px); transform-origin: top right; }
      to   { opacity:1; transform:scale(1) translateY(0);      transform-origin: top right; }
    }
    @keyframes expandPanelIn {
      from { opacity:0; transform:translateX(48px); }
      to   { opacity:1; transform:translateX(0); }
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes chipIn {
      from { opacity:0; transform:translateX(-6px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .anim-chipIn { animation: chipIn .28s cubic-bezier(.22,.68,0,1.05) both; }
    @keyframes popIn {
      from { opacity:0; transform:scale(.96); }
      to   { opacity:1; transform:scale(1); }
    }
    @keyframes typingBounce {
      0%,60%,100% { transform:translateY(0); opacity:.4; }
      30%          { transform:translateY(-5px); opacity:1; }
    }

    .anim-spin    { animation: spin 1.4s linear infinite; }
    .anim-fadeUp  { animation: fadeUp .35s cubic-bezier(.22,.68,0,1.05) both; }
    .anim-pulse   { animation: pulseDot 2s ease-in-out infinite; }
    .anim-check   { animation: checkIn .22s cubic-bezier(.34,1.56,.64,1) both; }
    .anim-slide   { animation: slideRight .4s cubic-bezier(.22,.68,0,1.05) both; }
    .anim-fade    { animation: fadeIn .3s ease both; }
    .anim-pop     { animation: popIn .35s cubic-bezier(.22,.68,0,1.1) both; }
    .opt-btn .opt-arrow { opacity:0; transition: opacity .15s, transform .15s; transform: translateX(-4px); }
    .opt-btn:hover .opt-arrow { opacity:.7; transform: translateX(0); }

    .shimmer-bar {
      background: linear-gradient(90deg,transparent 0%,#7c3aed 40%,#a78bfa 50%,#7c3aed 60%,transparent 100%);
      background-size: 400% 100%;
      animation: shimmer 2s ease-in-out infinite;
    }
    .tr { transition: all .15s ease; }

    /* Custom tooltip via data-tip attribute */
    [data-tip] { position: relative; }
    [data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 7px);
      left: 50%;
      transform: translateX(-50%);
      padding: 5px 10px;
      border-radius: 6px;
      white-space: nowrap;
      background: #0a0a0a;
      border: 1px solid rgba(255,255,255,.12);
      font-size: 11px;
      color: #e8e8e8;
      font-family: 'Geist', sans-serif;
      font-weight: 500;
      box-shadow: 0 6px 20px rgba(0,0,0,.8), 0 0 0 1px rgba(255,255,255,.04);
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transition: opacity .12s ease;
    }
    [data-tip]:hover::after { opacity: 1; }
    [data-tip-r]::after { left: auto; right: 0; transform: none; }
    /* tip-bottom: tooltip appears below the element (for overflow:hidden containers) */
    [data-tip-b]::after { bottom: auto; top: calc(100% + 7px); }

    /* Placeholder colour – readable at 3:1 minimum */
    ::placeholder { color: #555 !important; opacity: 1; }

    /* VM macOS-style wallpaper */
    .vm-bg {
      background:
        radial-gradient(ellipse at 15% 55%, #3b1278 0%, transparent 58%),
        radial-gradient(ellipse at 75% 20%, #7b2d8b 0%, transparent 52%),
        radial-gradient(ellipse at 60% 82%, #c44569 0%, transparent 52%),
        radial-gradient(ellipse at 92% 65%, #e8704a 0%, transparent 48%),
        linear-gradient(135deg, #0d0221 0%, #1a0533 100%);
    }

    /* ── MOBILE RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 767px) {
      /* Disable tooltips on touch devices */
      [data-tip]::after, [data-tip-r]::after, [data-tip-b]::after { display: none !important; }

      /* Thinner scrollbars on mobile */
      ::-webkit-scrollbar { width: 2px; }

      /* Full-screen panels on mobile */
      html, body, #root { overflow: hidden; }

      /* iOS Safari: use dynamic viewport height to avoid address bar overlap */
      .h-screen { height: 100dvh !important; }
      html, body, #root { height: 100dvh; }

      /* Touch action: pan-y for smooth scroll in chat */
      [role="log"] { touch-action: pan-y; }

      /* Increase tap target for buttons */
      button { min-height: 36px; }
    }

    /* Sidebar mobile drawer */
    @keyframes slideInLeft {
      from { transform: translateX(-100%); opacity: 0; }
      to   { transform: translateX(0);     opacity: 1; }
    }
    .sidebar-drawer {
      position: fixed !important;
      left: 0; top: 0; bottom: 0;
      width: 240px !important;
      z-index: 100;
      animation: slideInLeft .22s cubic-bezier(.22,.68,0,1.05) both;
    }
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 99;
      animation: fadeIn .18s ease both;
      backdrop-filter: blur(2px);
    }

    /* Mobile bottom tab bar */
    .mobile-tab-bar {
      display: flex;
      background: #0d0d0d;
      border-top: 1px solid #252525;
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .mobile-tab-btn {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 8px 0 6px;
      font-size: 10px;
      font-family: 'Geist', sans-serif;
      font-weight: 500;
      letter-spacing: .02em;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: color .15s;
      -webkit-tap-highlight-color: transparent;
    }

    /* Input bar with safe area */
    .input-bar-wrap {
      padding-top: 12px;
      padding-left: max(20px, env(safe-area-inset-left));
      padding-right: max(20px, env(safe-area-inset-right));
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    /* Desktop hides mobile-only elements */
    @media (min-width: 768px) {
      .mobile-tab-bar { display: none !important; }
      .mobile-only    { display: none !important; }
    }
  </style>
</head>

  /* © YRC-2026 */

    const [idx, setIdx] = useState(0);
    const done = idx >= text.length;
    useEffect(() => { setIdx(0); }, [text]);
    useEffect(() => {
      if (idx >= text.length) { if (onDone) onDone(); return; }
      if (skipRef.current) { setIdx(text.length); return; }
      const id = setTimeout(() => setIdx(i => i+1), speed);
      return () => clearTimeout(id);
    }, [idx, text]);
    return (
      <span>
        {text.slice(0,idx)}
        {!done && <span style={{display:'inline-block',marginLeft:'1px',color:'#8b5cf6',

            </AgentBubble>

      )}

      {/* State 4+: User approved */}
      {appState>=4&&(
        <>
          {sep}
          <UserBubble>Approve and proceed.</UserBubble>
          {sep}

                              </svg>
                            </div>
                            <span style={{fontSize:6,color:'#202124',fontWeight:500}}>SG_Nordic_Japanese_Research_2026</span>
                          </div>
                          <div style={{flex:1,overflow:'hidden',display:'grid',gridTemplateColumns:'18px repeat(5,1fr)',fontSize:5,color:'#444',borderTop:'1px solid #e0e0e0'}}>
                            {['','Brand','Origin','Type','Price','Margin'].map((h,i)=>(
                              <div key={i} style={{padding:'1.5px 2px',background:'#f8f9fa',borderRight:'1px solid #e0e0e0',borderBottom:'1px solid #e0e0e0',fontWeight:600,color:'#444',whiteSpace:'nowrap',overflow:'hidden'}}>{h}</div>
                            ))}
                            {[['1','Marimekko','🇫🇮','🚦','SGD 36','40%'],['2','iittala','🇫🇮','🚦','SGD 58','45%'],['3','KINTO','🇯🇵','🚦','SGD 20','50%'],['4','HAY','🇩🇰','🚦','SGD 29','45%'],['5','Hasami','🇯🇵','🔎','SGD 14','50%'],['6','Kähler','🇩🇰','🚦','SGD 65','50%']].map((row,ri)=>row.map((cell,ci)=>(
                              <div key={`${ri}-${ci}`} style={{padding:'1.5px 2px',borderRight:'1px solid #e8e8e8',borderBottom:'1px solid #e8e8e8',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',background:ci===0?'#f8f9fa':'white'}}>{cell}</div>
                            )))}
                          </div>
                        </div>
                      )}
                      {showSERP&&(
                        <div style={{position:'absolute',left:0,right:0,height:2,background:'linear-gradient(90deg,transparent,rgba(66,133,244,.5),transparent)',animation:'shimmer 1.8s ease-in-out infinite',pointerEvents:'none',top:'40%'}}/>
                      )}
                      <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.42)',display:'flex',alignItems:'center',justifyContent:'center',opacity:0,transition:'opacity .15s ease',pointerEvents:'none'}}>
                        <div style={{display:'flex',alignItems:'center',gap:5,padding:'5px 11px',borderRadius:7,background:'rgba(255,255,255,.14)',border:'1px solid rgba(255,255,255,.28)',fontSize:11,fontWeight:600,color:'#fff',letterSpacing:'.01em'}}>
                          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
                            <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
                          </svg>
                          Expand
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })()}
              <div className="flex items-center justify-between" style={{padding:'7px 14px 10px'}}>
                <span style={{fontSize:'10px',fontFamily:'Geist Mono,monospace',fontWeight:600,
                              color:vmPanelProps.isWaiting?'#fde047':'#c4b5fd',letterSpacing:'.05em'}}>
                  {vmPanelProps.isWaiting ? '⏸ Waiting for input' : '▶ Browsing…'}
                </span>
                <span style={{fontSize:'10px',color:'rgba(167,139,250,.6)',fontFamily:'Geist Mono,monospace'}}>
                  {vmPanelProps.taskStep}/4
                </span>
              </div>
            </div>
          )}

          {/* ── VM panel — split (desktop) or full-screen (mobile) ── */}
          {vmMode!==null&&(
            <div style={{
              flexShrink: 0,
              overflow: 'hidden',
              minHeight: 0,
              // Desktop: animate width; Mobile: full-screen when on vm tab
              width: isMobile ? (mobileVmVisible ? '100%' : '0') : (isSplit ? '50%' : '0'),
              transition: isMobile ? 'none' : 'width .85s cubic-bezier(.4,0,.2,1)',
            }}>
              {(!isMobile || mobileVmVisible) && (
                <VMPanel {...vmPanelProps}
                  onCollapse={isMobile ? null : ()=>setVmMode('floating')}
                  onExpand={isMobile ? null : undefined}/>
              )}
            </div>
          )}

        </div>

        {/* ── Mobile bottom tab bar — shown when VM is active ── */}
        {isMobile&&vmMode!==null&&(
          <div className="mobile-tab-bar">
            {[
              {
                id:'chat', label:'Chat',
                icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
                badge: mobileTab==='vm' && (appState===5||appState===6),
              },
              {
                id:'vm', label:'Simular Computer',
                icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>,
                pulse: vmMode!==null && !vmPanelProps.isWaiting,
              },
            ].map(({id, label, icon, badge, pulse})=>(
              <button key={id} className="mobile-tab-btn" onClick={()=>setMobileTab(id)}
                style={{color: mobileTab===id ? '#c4b5fd' : '#555'}}>
                <div style={{position:'relative',display:'inline-flex'}}>
                  {icon}
                  {badge&&(
                    <span style={{
                      position:'absolute',top:-2,right:-2,
                      width:7,height:7,borderRadius:'50%',
                      background:'#ef4444',border:'1.5px solid #0d0d0d',
                    }}/>
                  )}
                  {pulse&&mobileTab!==id&&(
                    <span style={{
                      position:'absolute',top:-2,right:-2,
                      width:7,height:7,borderRadius:'50%',
                      background:'#a78bfa',border:'1.5px solid #0d0d0d',
                      animation:'pulseDot 2s ease-in-out infinite',
                    }}/>
                  )}
                </div>
                <span>{label}</span>
                {mobileTab===id&&(
                  <div style={{
                    position:'absolute', bottom:0, left:'50%', transform:'translateX(-50%)',
                    width:24, height:2, borderRadius:1,
                    background:'#c4b5fd',
                  }}/>
                )}
              </button>
            ))}
          </div>
        )}

      </div>
      </SkipAnimCtx.Provider>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
