<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  Simular AI — Budget Code HITL Demo                          ║
  ║  User Story: Agent pauses expense form to request missing    ║
  ║  project budget code from the user before continuing.        ║
  ║  Design by YR Cheng · © 2026 All rights reserved.           ║
  ╚══════════════════════════════════════════════════════════════╝
-->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Budget Code Handoff — Simular AI HITL Demo</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; overflow: hidden; }
body {
  font-family: 'Geist', -apple-system, sans-serif;
  background: #0d0d0d;
  color: #d4d4d4;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
::placeholder { color: #555 !important; opacity: 1; }

/* ── Design tokens ── */
:root {
  --bg-base:    #0d0d0d;
  --bg-e1:      #161616;
  --bg-e2:      #1a1a1a;
  --bg-e2b:     #181818;
  --bg-e3:      #252525;
  --bg-e4:      #2e2e2e;
  --b-subtle:   #2a2a2a;
  --b-default:  #2e2e2e;
  --b-medium:   #333;
  --b-strong:   #383838;
  --b-glass:    rgba(255,255,255,.12);
  --t-high:     #eaeaea;
  --t-pri:      #e2e2e2;
  --t-body:     #d4d4d4;
  --t-sec:      #c8c8c8;
  --t-3:        #aaa;
  --t-m1:       #888;
  --t-m2:       #777;
  --t-m3:       #666;
  --t-m4:       #555;
  --p-950:      #1e1b4b;
  --p-700:      #7c3aed;
  --p-600:      #8b5cf6;
  --p-500:      #9d8ec8;
  --p-400:      #a78bfa;
  --p-300:      #c4b5fd;
  --p-t06:      rgba(139,92,246,.06);
  --p-t08:      rgba(139,92,246,.08);
  --p-t10:      rgba(139,92,246,.10);
  --p-t12:      rgba(139,92,246,.12);
  --p-t14:      rgba(139,92,246,.14);
  --p-t15:      rgba(139,92,246,.15);
  --p-t22:      rgba(139,92,246,.22);
  --p-t30:      rgba(139,92,246,.30);
  --bl-400:     #60a5fa;
  --bl-200:     #bfdbfe;
  --bl-100:     #dbeafe;
  --bl-t06:     rgba(37,99,235,.06);
  --bl-t15:     rgba(59,130,246,.15);
  --bl-t22:     rgba(59,130,246,.22);
  --r-500:      #ef4444;
  --r-400:      #f87171;
  --r-t12:      rgba(239,68,68,.12);
  --a-400:      #fbbf24;
  --a-t15:      rgba(234,179,8,.15);
  --g-500:      #22c55e;
  --sans:       'Geist', -apple-system, sans-serif;
  --mono:       'Geist Mono', monospace;
  --r-sm:       6px;
  --r-md:       7px;
  --r-lg:       8px;
  --r-xl:       10px;
  --r-2xl:      12px;
  --r-3xl:      16px;
  --r-full:     9999px;
  --sh-md:      0 4px 24px rgba(0,0,0,.35);
  --sh-xl:      0 8px 32px rgba(0,0,0,.50);
  --sh-2xl:     0 12px 32px rgba(0,0,0,.60);
  --sh-focus:   0 0 0 3px rgba(139,92,246,.10);
  --tr:         all .15s ease;
}

/* ── Keyframes ── */
@keyframes spin         { to { transform: rotate(360deg); } }
@keyframes fadeIn       { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeUp       { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulseDot     { 0%,100% { opacity:.5; transform:scale(.85); } 50% { opacity:1; transform:scale(1.2); } }
@keyframes checkIn      { from { opacity:0; transform:scale(.5) rotate(-15deg); } to { opacity:1; transform:scale(1) rotate(0); } }
@keyframes shimmer      { 0% { background-position:-400% 0; } 100% { background-position:400% 0; } }
@keyframes chipIn       { from { opacity:0; transform:translateX(-6px); } to { opacity:1; transform:translateX(0); } }
@keyframes popIn        { from { opacity:0; transform:scale(.96); } to { opacity:1; transform:scale(1); } }
@keyframes typingBounce { 0%,60%,100% { transform:translateY(0); opacity:.4; } 30% { transform:translateY(-5px); opacity:1; } }

.anim-fadeUp  { animation: fadeUp  .35s cubic-bezier(.22,.68,0,1.05) both; }
.anim-chipIn  { animation: chipIn  .28s cubic-bezier(.22,.68,0,1.05) both; }
.anim-pop     { animation: popIn   .35s cubic-bezier(.22,.68,0,1.1)  both; }
.anim-check   { animation: checkIn .22s cubic-bezier(.34,1.56,.64,1) both; }
.anim-pulse   { animation: pulseDot 2s ease-in-out infinite; }
.anim-spin    { animation: spin 1.4s linear infinite; }
.tr { transition: all .15s ease; }

.shimmer-bar {
  background: linear-gradient(90deg,transparent 0%,#7c3aed 40%,#a78bfa 50%,#7c3aed 60%,transparent 100%);
  background-size: 400% 100%;
  animation: shimmer 2s ease-in-out infinite;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  /* ─────────────────────────────────────────────────────────────
     SHARED PRIMITIVES  (matching AgentUI visual language)
  ───────────────────────────────────────────────────────────── */

  const UserBubble = ({ children, delay=0 }) => (
    <div className="flex justify-end anim-fadeUp" style={{animationDelay:`${delay}ms`}}>
      <div style={{maxWidth:'86%'}}>
        <div className="px-4 py-3 rounded-2xl rounded-tr-sm text-[14px] leading-[1.65]"
             style={{background:'#1e1e1e',border:'1px solid #2e2e2e',color:'#c8c8c8'}}>
          {children}
        </div>
      </div>
    </div>
  );

  const AgentBubble = ({ children, delay=0 }) => (
    <div className="anim-fadeUp" style={{animationDelay:`${delay}ms`}}>
      <div style={{fontSize:'14.5px',lineHeight:'1.75',color:'#d4d4d4'}}>
        {children}
      </div>
    </div>
  );

  const TypingBubble = () => (
    <div className="anim-fadeUp flex items-center gap-1.5" style={{height:'22px'}}>
      {[0,180,360].map(d=>(
        <span key={d} className="w-[5px] h-[5px] rounded-full"
              style={{background:'#555',animation:`typingBounce 1.1s ease-in-out ${d}ms infinite`}}/>
      ))}
    </div>
  );

  /* Action chip — mirrors AgentUI's ActionChip */
  const ActionChip = ({ text, done=false, delay=0 }) => (
    <div className="anim-chipIn flex items-center gap-2 px-1 py-0.5"
         style={{margin:'4px 0', animationDelay:`${delay}ms`}}>
      <div style={{width:18,height:18,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
        {done ? (
          <svg className="anim-check" width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="#4a4a4a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        ) : (
          <div className="anim-pulse" style={{width:6,height:6,borderRadius:'50%',background:'#7c3aed',opacity:.8}}/>
        )}
      </div>
      <span style={{fontSize:'11.5px',color:done?'#444':'#5a5a5a',letterSpacing:'.01em',fontWeight:done?400:500}}>
        {text}
      </span>
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
           stroke={done?'#383838':'#484848'} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>
  );

  /* ─────────────────────────────────────────────────────────────
     BUDGET CODE HANDOFF COMPONENT
     States: awaiting → submitted → complete
  ───────────────────────────────────────────────────────────── */

  const BudgetCodeHandoff = ({ formName, fieldsCompleted, fieldsTotal, onComplete }) => {
    const [phase,         setPhase]         = useState('awaiting');
    const [code,          setCode]          = useState('');
    const [confirmedCode, setConfirmedCode] = useState('');

    const fieldsAfterCode = fieldsTotal - fieldsCompleted - 1;
    const progressPct     = Math.round((fieldsCompleted / fieldsTotal) * 100);

    const handleSubmit = () => {
      if (!code.trim()) return;
      const val = code.trim().toUpperCase();
      setConfirmedCode(val);
      setPhase('submitted');
      setTimeout(() => {
        setPhase('complete');
        if (onComplete) onComplete(val);
      }, 2400);
    };

    /* ── AWAITING INPUT ── */
    if (phase === 'awaiting') return (
      <div className="anim-pop" style={{
        borderRadius:'var(--r-2xl)',
        border:'1px solid var(--bl-t22)',
        background:'var(--bl-t06)',
        overflow:'hidden',
      }}>
        {/* Header strip */}
        <div className="flex items-center gap-2.5 px-4 py-3" style={{
          borderBottom:'1px solid var(--bl-t15)',
          background:'var(--bl-t06)',
        }}>
          <div style={{
            width:7,height:7,borderRadius:'50%',flexShrink:0,
            background:'var(--bl-400)',
            boxShadow:'0 0 6px rgba(59,130,246,.5)',
          }}/>
          <span style={{
            fontSize:'11.5px',fontWeight:600,
            color:'var(--bl-200)',
            fontFamily:'var(--mono)',
            letterSpacing:'.05em',textTransform:'uppercase',
          }}>Input needed · Paused</span>
        </div>

        <div className="px-4 pt-3 pb-4" style={{display:'flex',flexDirection:'column',gap:'14px'}}>

          {/* Progress bar */}
          <div>
            <div className="flex items-center justify-between" style={{marginBottom:'7px'}}>
              <span style={{fontSize:'11.5px',color:'var(--t-m1)',fontFamily:'var(--sans)'}}>
                {formName}
              </span>
              <span style={{fontSize:'11px',color:'var(--t-m2)',fontFamily:'var(--mono)'}}>
                {fieldsCompleted} / {fieldsTotal} fields
              </span>
            </div>
            <div style={{height:3,borderRadius:'var(--r-full)',background:'var(--p-t10)'}}>
              <div style={{
                height:'100%',borderRadius:'var(--r-full)',
                width:`${progressPct}%`,
                background:'var(--p-600)',
              }}/>
            </div>
          </div>

          {/* Explanation text */}
          <div style={{fontSize:'13.5px',color:'var(--t-body)',fontFamily:'var(--sans)',lineHeight:'1.65'}}>
            I need one piece of information before I can continue.
          </div>
          <div style={{fontSize:'12.5px',color:'var(--t-3)',fontFamily:'var(--sans)',lineHeight:'1.6'}}>
            The form requires a{' '}
            <span style={{fontFamily:'var(--mono)',fontSize:'12px',color:'var(--t-pri)'}}>
              Project Budget Code
            </span>
            {' '}— this is specific to your team and project. I don't have access to it and cannot infer or guess this value.
          </div>

          {/* Input */}
          <div>
            <label style={{
              display:'block',
              fontSize:'11px',color:'var(--t-m2)',
              fontFamily:'var(--mono)',letterSpacing:'.04em',
              textTransform:'uppercase',marginBottom:'7px',
            }}>
              Project Budget Code
            </label>
            <input
              type="text"
              value={code}
              onChange={e=>setCode(e.target.value)}
              onKeyDown={e=>{ if(e.key==='Enter' && code.trim()) handleSubmit(); }}
              placeholder="e.g. MKTG-2026-Q1"
              autoFocus
              style={{
                width:'100%',
                background:'var(--bg-e2)',
                border:'1px solid var(--b-strong)',
                borderRadius:'var(--r-md)',
                padding:'9px 12px',
                fontSize:'13px',
                fontFamily:'var(--mono)',
                color:'var(--t-high)',
                outline:'none',
                transition:'border-color .15s, box-shadow .15s',
              }}
              onFocus={e=>{
                e.currentTarget.style.borderColor='rgba(59,130,246,.55)';
                e.currentTarget.style.boxShadow='0 0 0 3px var(--bl-t15)';
              }}
              onBlur={e=>{
                e.currentTarget.style.borderColor='var(--b-strong)';
                e.currentTarget.style.boxShadow='none';
              }}
            />
          </div>

          {/* Submit button */}
          <button
            onClick={handleSubmit}
            disabled={!code.trim()}
            style={{
              width:'100%',
              padding:'9px 16px',
              borderRadius:'var(--r-lg)',
              border:'1px solid '+(code.trim()?'var(--bl-t22)':'var(--b-subtle)'),
              background: code.trim()?'var(--bl-t15)':'transparent',
              color: code.trim()?'var(--bl-400)':'var(--t-m3)',
              fontSize:'13px',fontWeight:500,
              fontFamily:'var(--sans)',
              cursor: code.trim()?'pointer':'not-allowed',
              transition:'all .15s ease',
            }}
            onMouseEnter={e=>{
              if(code.trim()){
                e.currentTarget.style.background='var(--bl-t22)';
                e.currentTarget.style.borderColor='rgba(59,130,246,.38)';
              }
            }}
            onMouseLeave={e=>{
              if(code.trim()){
                e.currentTarget.style.background='var(--bl-t15)';
                e.currentTarget.style.borderColor='var(--bl-t22)';
              }
            }}>
            Confirm and continue
          </button>

        </div>
      </div>
    );

    /* ── SUBMITTED / RESUMING ── */
    if (phase === 'submitted') return (
      <div className="anim-pop" style={{
        borderRadius:'var(--r-2xl)',
        border:'1px solid var(--p-t22)',
        background:'var(--p-t06)',
        overflow:'hidden',
      }}>
        <div className="flex items-center gap-2.5 px-4 py-3" style={{
          borderBottom:'1px solid var(--p-t12)',
          background:'var(--p-t06)',
        }}>
          <div className="anim-pulse" style={{
            width:7,height:7,borderRadius:'50%',flexShrink:0,
            background:'var(--p-400)',
          }}/>
          <span style={{
            fontSize:'11.5px',fontWeight:600,
            color:'var(--p-300)',
            fontFamily:'var(--mono)',
            letterSpacing:'.05em',textTransform:'uppercase',
          }}>Resuming task…</span>
        </div>

        <div className="px-4 pt-3 pb-4" style={{display:'flex',flexDirection:'column',gap:'10px'}}>
          <div className="flex items-center gap-2" style={{flexWrap:'wrap'}}>
            <span style={{fontSize:'12px',color:'var(--t-m1)',fontFamily:'var(--sans)'}}>
              Budget code received:
            </span>
            <span style={{
              padding:'2px 9px',
              borderRadius:'var(--r-sm)',
              background:'var(--bg-e3)',
              border:'1px solid var(--b-medium)',
              fontFamily:'var(--mono)',
              fontSize:'12px',
              color:'var(--t-high)',
              letterSpacing:'.04em',
            }}>
              {confirmedCode}
            </span>
          </div>
          <div className="flex items-center gap-2">
            <span style={{fontSize:'12.5px',color:'var(--t-3)',fontFamily:'var(--sans)'}}>
              Filling {fieldsAfterCode} remaining field{fieldsAfterCode!==1?'s':''}
            </span>
            <div className="flex items-center gap-1">
              {[0,160,320].map(d=>(
                <span key={d} style={{
                  display:'inline-block',width:4,height:4,borderRadius:'50%',
                  background:'var(--p-400)',
                  animation:`pulseDot 1.1s ease-in-out ${d}ms infinite`,
                }}/>
              ))}
            </div>
          </div>
        </div>
      </div>
    );

    /* ── COMPLETE ── */
    const ts = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
    return (
      <div className="anim-pop" style={{
        borderRadius:'var(--r-2xl)',
        border:'1px solid rgba(34,197,94,.18)',
        background:'rgba(34,197,94,.04)',
        overflow:'hidden',
      }}>
        <div className="flex items-center gap-2.5 px-4 py-3" style={{
          borderBottom:'1px solid rgba(34,197,94,.12)',
          background:'rgba(34,197,94,.04)',
        }}>
          <svg className="anim-check" width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="var(--g-500)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span style={{
            fontSize:'11.5px',fontWeight:600,
            color:'var(--g-500)',
            fontFamily:'var(--mono)',
            letterSpacing:'.05em',textTransform:'uppercase',
          }}>Expense report complete</span>
        </div>

        <div className="px-4 pt-3 pb-4" style={{display:'flex',flexDirection:'column',gap:'6px'}}>
          <div style={{fontSize:'12.5px',color:'var(--t-3)',fontFamily:'var(--sans)'}}>
            {formName}
          </div>
          <div className="flex items-center" style={{gap:'10px',flexWrap:'wrap'}}>
            <span style={{fontSize:'12px',color:'var(--t-m2)',fontFamily:'var(--sans)'}}>
              {fieldsTotal} of {fieldsTotal} fields filled
            </span>
            <span style={{
              width:3,height:3,borderRadius:'50%',
              background:'var(--t-m4)',display:'inline-block',flexShrink:0,
            }}/>
            <span style={{fontSize:'12px',color:'var(--t-m2)',fontFamily:'var(--sans)'}}>
              Budget code:&nbsp;
              <span style={{fontFamily:'var(--mono)',color:'var(--t-3)'}}>{confirmedCode}</span>
            </span>
          </div>
          <div style={{fontSize:'11px',color:'var(--t-m3)',fontFamily:'var(--mono)',marginTop:'2px'}}>
            {ts}
          </div>
        </div>
      </div>
    );
  };

  /* ─────────────────────────────────────────────────────────────
     DEMO APP
  ───────────────────────────────────────────────────────────── */

  /* Scripted conversation steps */
  const FIELDS_DONE = [
    'Reading expense report template',
    'Filling: Submitter name — YR Cheng',
    'Filling: Department — Product Design',
    'Filling: Event name — Q1 Team Offsite',
    'Filling: Event date — 14 Mar 2026',
    'Filling: Venue — Andaz Singapore',
    'Filling: Attendee count — 12',
    'Filling: Total amount — SGD 4,840.00',
  ];

  const FIELDS_AFTER = [
    'Filling: Cost centre — CC-SGP-042',
    'Filling: Approval manager — David Lin',
    'Filling: Payment method — Corporate Card ···4821',
  ];

  const App = () => {
    /* step controls which scripted elements are visible:
       0  → idle (pre-start)
       1  → user message
       2  → agent ack
       3  → filling chips (8 pre-code fields)
       4  → HITL card
       5  → post-code chips
       6  → final agent message                            */
    const [step,          setStep]          = useState(0);
    const [chipsShown,    setChipsShown]    = useState(0); // 0–8 pre-code chips
    const [afterChips,    setAfterChips]    = useState(0); // 0–3 post-code chips
    const [confirmedCode, setConfirmedCode] = useState('');
    const [demoKey,       setDemoKey]       = useState(0); // forces re-mount on reset
    const bottomRef = useRef(null);

    /* Auto-scroll to bottom whenever step or chips advance */
    useEffect(()=>{
      if (bottomRef.current) {
        bottomRef.current.scrollIntoView({ behavior:'smooth', block:'end' });
      }
    }, [step, chipsShown, afterChips]);

    /* Chip ticker: advance one chip every 420ms while in step 3 */
    useEffect(()=>{
      if (step !== 3) return;
      if (chipsShown >= FIELDS_DONE.length) {
        const t = setTimeout(()=>setStep(4), 600);
        return ()=>clearTimeout(t);
      }
      const t = setTimeout(()=>setChipsShown(n=>n+1), 420);
      return ()=>clearTimeout(t);
    }, [step, chipsShown]);

    /* Post-code chip ticker */
    useEffect(()=>{
      if (step !== 5) return;
      if (afterChips >= FIELDS_AFTER.length) {
        const t = setTimeout(()=>setStep(6), 700);
        return ()=>clearTimeout(t);
      }
      const t = setTimeout(()=>setAfterChips(n=>n+1), 500);
      return ()=>clearTimeout(t);
    }, [step, afterChips]);

    const startDemo = () => {
      setStep(1);
      setTimeout(()=>setStep(2), 600);
      setTimeout(()=>setStep(3), 1400);
    };

    const handleCodeConfirmed = (code) => {
      setConfirmedCode(code);
      setTimeout(()=>{ setStep(5); }, 300);
    };

    const resetDemo = () => {
      setStep(0);
      setChipsShown(0);
      setAfterChips(0);
      setConfirmedCode('');
      setDemoKey(k=>k+1);
    };

    return (
      <div className="flex flex-col" style={{height:'100%',background:'var(--bg-base)'}}>

        {/* ── Header ── */}
        <div className="flex items-center justify-between flex-shrink-0"
             style={{
               background:'#0d0d0d',
               borderBottom:'1px solid #383838',
               height:'44px',
               padding:'0 20px',
             }}>
          <div className="flex items-center gap-2">
            <img src="/prototype/logo/simular_ai_logo.jpeg" width={22} height={22}
                 style={{borderRadius:'6px',objectFit:'cover'}}
                 onError={e=>{e.currentTarget.style.display='none';}}/>
            <span style={{fontSize:'14px',fontWeight:600,color:'#e2e2e2',fontFamily:'var(--sans)'}}>
              Simular AI
            </span>
            {/* Demo badge */}
            <span style={{
              padding:'2px 8px',borderRadius:'var(--r-sm)',marginLeft:'6px',
              background:'rgba(59,130,246,.1)',
              border:'1px solid rgba(59,130,246,.22)',
              color:'#60a5fa',
              fontSize:'10.5px',fontWeight:600,
              fontFamily:'var(--mono)',letterSpacing:'.05em',textTransform:'uppercase',
            }}>
              HITL Demo
            </span>
          </div>

          <div className="flex items-center gap-3">
            {/* Cloud status */}
            <span className="flex items-center gap-1.5"
                  style={{fontSize:'11px',color:'#888',fontFamily:'var(--mono)',letterSpacing:'.04em'}}>
              <span style={{
                width:6,height:6,borderRadius:'50%',
                background: step>=3&&step<6?'#a78bfa':'#22c55e',
                display:'inline-block',flexShrink:0,
                animation: step>=3&&step<6?'pulseDot 2s ease-in-out infinite':'none',
              }}/>
              {step===0&&'Cloud Computer Active'}
              {step===1&&'Cloud Computer Active'}
              {step===2&&'Cloud Computer Active'}
              {(step>=3&&step<4)&&'Agent filling form…'}
              {step===4&&'Waiting for input'}
              {(step>=5&&step<6)&&'Agent filling form…'}
              {step===6&&'Task complete'}
            </span>

            {/* Reset button — visible once demo is running */}
            {step > 0 && (
              <button
                onClick={resetDemo}
                className="tr"
                style={{
                  display:'flex',alignItems:'center',gap:'5px',
                  padding:'4px 10px',borderRadius:'var(--r-md)',
                  background:'transparent',
                  border:'1px solid var(--b-strong)',
                  color:'var(--t-m2)',
                  fontSize:'11.5px',fontWeight:500,
                  fontFamily:'var(--sans)',
                  cursor:'pointer',
                }}
                onMouseEnter={e=>{e.currentTarget.style.background='#1a1a1a';e.currentTarget.style.color='#aaa';}}
                onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='var(--t-m2)';}}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/>
                </svg>
                Reset
              </button>
            )}
          </div>
        </div>

        {/* Shimmer bar while agent is active */}
        {(step===3||step===5) && (
          <div className="shimmer-bar flex-shrink-0" style={{height:'2px'}}/>
        )}

        {/* ── Chat area ── */}
        <div className="flex-1 overflow-y-auto" style={{padding:'24px 0'}}>
          <div style={{maxWidth:'660px',margin:'0 auto',padding:'0 20px',display:'flex',flexDirection:'column',gap:'20px'}}>

            {/* ── START STATE ── */}
            {step === 0 && (
              <div className="anim-fadeUp flex flex-col items-center" style={{gap:'20px',paddingTop:'60px'}}>
                <div style={{
                  width:52,height:52,borderRadius:'var(--r-xl)',
                  background:'rgba(139,92,246,.08)',
                  border:'1px solid rgba(139,92,246,.18)',
                  display:'flex',alignItems:'center',justifyContent:'center',
                }}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                       stroke="var(--p-400)" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                  </svg>
                </div>
                <div style={{textAlign:'center',display:'flex',flexDirection:'column',gap:'8px'}}>
                  <div style={{fontSize:'16px',fontWeight:600,color:'var(--t-pri)',fontFamily:'var(--sans)'}}>
                    Budget Code Handoff
                  </div>
                  <div style={{fontSize:'13px',color:'var(--t-m1)',fontFamily:'var(--sans)',lineHeight:'1.65',maxWidth:'340px'}}>
                    The agent hits a field it can't fill — pauses, asks the user, then continues.
                  </div>
                </div>
                <button
                  onClick={startDemo}
                  style={{
                    display:'flex',alignItems:'center',gap:'7px',
                    padding:'10px 20px',borderRadius:'var(--r-xl)',
                    background:'var(--p-t15)',
                    border:'1px solid var(--p-t22)',
                    color:'var(--p-400)',
                    fontSize:'13px',fontWeight:500,
                    fontFamily:'var(--sans)',
                    cursor:'pointer',
                    transition:'all .15s ease',
                  }}
                  onMouseEnter={e=>{e.currentTarget.style.background='var(--p-t22)';e.currentTarget.style.borderColor='rgba(139,92,246,.38)';}}
                  onMouseLeave={e=>{e.currentTarget.style.background='var(--p-t15)';e.currentTarget.style.borderColor='var(--p-t22)';}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                       strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                  </svg>
                  Run demo
                </button>
              </div>
            )}

            {/* ── USER MESSAGE ── */}
            {step >= 1 && (
              <UserBubble delay={0}>
                Please fill out the Q1 Team Offsite expense report for me.
              </UserBubble>
            )}

            {/* ── AGENT ACK ── */}
            {step >= 2 && (
              <AgentBubble delay={0}>
                On it. I'll fill out the Q1 Team Offsite Expense Report now.
              </AgentBubble>
            )}

            {/* ── PRE-CODE CHIPS ── */}
            {step >= 3 && (
              <div>
                {FIELDS_DONE.slice(0, chipsShown).map((text, i) => (
                  <ActionChip key={i} text={text} done={true} delay={0}/>
                ))}
                {/* Last chip in-progress spinner while ticker hasn't reached end */}
                {chipsShown < FIELDS_DONE.length && (
                  <div className="anim-chipIn flex items-center gap-2 px-1 py-0.5" style={{margin:'4px 0'}}>
                    <div style={{width:18,height:18,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <div className="anim-spin" style={{
                        width:11,height:11,borderRadius:'50%',
                        border:'1.5px solid rgba(139,92,246,.15)',
                        borderTopColor:'#7c3aed',
                      }}/>
                    </div>
                    <span style={{fontSize:'11.5px',color:'#5a5a5a',letterSpacing:'.01em',fontWeight:500}}>
                      Filling form fields…
                    </span>
                  </div>
                )}
              </div>
            )}

            {/* ── HITL CARD ── */}
            {step >= 4 && (
              <BudgetCodeHandoff
                key={demoKey}
                formName="Q1 Team Offsite Expense Report"
                fieldsCompleted={8}
                fieldsTotal={12}
                onComplete={handleCodeConfirmed}
              />
            )}

            {/* ── POST-CODE CHIPS ── */}
            {step >= 5 && (
              <div>
                {FIELDS_AFTER.slice(0, afterChips).map((text, i) => (
                  <ActionChip key={i} text={text} done={true} delay={0}/>
                ))}
                {afterChips < FIELDS_AFTER.length && (
                  <div className="anim-chipIn flex items-center gap-2 px-1 py-0.5" style={{margin:'4px 0'}}>
                    <div style={{width:18,height:18,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <div className="anim-spin" style={{
                        width:11,height:11,borderRadius:'50%',
                        border:'1.5px solid rgba(139,92,246,.15)',
                        borderTopColor:'#7c3aed',
                      }}/>
                    </div>
                    <span style={{fontSize:'11.5px',color:'#5a5a5a',letterSpacing:'.01em',fontWeight:500}}>
                      Filling remaining fields…
                    </span>
                  </div>
                )}
              </div>
            )}

            {/* ── FINAL AGENT MESSAGE ── */}
            {step >= 6 && (
              <AgentBubble delay={0}>
                Done. The expense report has been submitted — all 12 fields filled, including budget code{' '}
                <span style={{fontFamily:'var(--mono)',fontSize:'13px',color:'var(--t-pri)'}}>
                  {confirmedCode}
                </span>
                . You'll receive a confirmation email from the finance system shortly.
              </AgentBubble>
            )}

            <div ref={bottomRef} style={{height:'8px'}}/>
          </div>
        </div>

        {/* ── Fake input bar (visual fidelity only) ── */}
        <div className="flex-shrink-0" style={{
          borderTop:'1px solid #232323',
          background:'#0d0d0d',
          padding:'12px 20px',
        }}>
          <div style={{maxWidth:'660px',margin:'0 auto'}}>
            <div style={{
              display:'flex',alignItems:'center',gap:'10px',
              background:'#111',
              border:'1px solid #2e2e2e',
              borderRadius:'var(--r-2xl)',
              padding:'10px 14px',
            }}>
              <span style={{
                flex:1,fontSize:'13.5px',
                color: step===4?'var(--bl-400)':'var(--t-m3)',
                fontFamily:'var(--sans)',
                transition:'color .3s ease',
              }}>
                {step===4
                  ? 'Enter the Project Budget Code above to continue…'
                  : step===0
                  ? 'Send a message'
                  : 'Reply'}
              </span>
              <div style={{
                width:28,height:28,borderRadius:'50%',
                display:'flex',alignItems:'center',justifyContent:'center',
                background:'rgba(139,92,246,.18)',
                flexShrink:0,
              }}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                     stroke="var(--p-400)" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </div>
            </div>
          </div>
        </div>

      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
